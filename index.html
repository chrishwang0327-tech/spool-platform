<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spool</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Kaushan+Script&family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --green-bg:#f7f7f2;
    --cream:#fffefa;
    --ink:#1a1a1a;
    --tee-color:#eee9dc;
    --hoodie-color:#eee9dc;
    --sweatshirt-color:#eee9dc;
    --sweatpants-color:#eee9dc;
    --accent:#e0562f;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:'Poppins',sans-serif;
    background:var(--green-bg);
    color:var(--ink);
    min-height:100vh;
  }
  body.home-mode{background:#f7f7f2;}
  body.home-mode #app{max-width:1440px;}
  body:not(.home-mode){
    --accent:#403d37;
    background-color:#f7f7f2;
    background-image:
      radial-gradient(circle at 18% 12%,rgba(65,65,60,.035) 0 1px,transparent 1.4px),
      radial-gradient(circle at 74% 64%,rgba(65,65,60,.025) 0 1px,transparent 1.5px),
      repeating-linear-gradient(0deg,transparent 0,transparent 31px,rgba(65,65,60,.022) 31px,rgba(65,65,60,.022) 32px);
    background-size:19px 23px,27px 31px,100% 32px;
  }
  body:not(.home-mode) #app{position:relative;}
  body:not(.home-mode) #app::before{
    content:"";position:fixed;left:30px;top:0;bottom:0;width:1px;background:rgba(80,72,60,.11);pointer-events:none;
  }
  body:not(.home-mode) .logo img{filter:grayscale(1) contrast(.88);opacity:.86;width:min(220px,58vw);}
  body:not(.home-mode) .config-btn,
  body:not(.home-mode) .inline-options,
  body:not(.home-mode) .sub-btn,
  body:not(.home-mode) .garment-canvas-viewport,
  body:not(.home-mode) .pattern-card,
  body:not(.home-mode) .sample-modal{
    background:rgba(255,253,245,.72);
    border-color:#45423b;
    box-shadow:2px 3px 0 rgba(48,44,38,.15),-2px -1px 0 rgba(48,44,38,.055);
  }
  body:not(.home-mode) .config-btn:nth-of-type(odd){transform:rotate(-.18deg);}
  body:not(.home-mode) .config-btn:nth-of-type(even){transform:rotate(.14deg);}
  body:not(.home-mode) .config-btn:hover{transform:translateY(-2px) rotate(0);box-shadow:5px 6px 0 rgba(25,25,25,.2);}
  body:not(.home-mode) .config-btn.active,
  body:not(.home-mode) .sub-btn.selected{background:rgba(255,255,252,.88);border-color:#403d37;box-shadow:3px 4px 0 rgba(48,44,38,.22);}
  body:not(.home-mode) .sub-btn.selected::after{color:#403d37;font:24px 'Kaushan Script',cursive;transform:rotate(-10deg);}
  body:not(.home-mode) .item-title,
  body:not(.home-mode) .sub-heading,
  body:not(.home-mode) .fabric-label{
    text-decoration-line:underline;text-decoration-style:wavy;text-decoration-thickness:1px;text-underline-offset:5px;text-decoration-color:rgba(35,35,35,.28);
  }
  body:not(.home-mode) .value,
  body:not(.home-mode) .upload-note,
  body:not(.home-mode) .preview-tip,
  body:not(.home-mode) .canvas-hint{
    font-family:'Kaushan Script',cursive;letter-spacing:.3px;
  }
  body:not(.home-mode) .placement-tab,
  body:not(.home-mode) .view-tab,
  body:not(.home-mode) .graphic-tool,
  body:not(.home-mode) .icon-action,
  body:not(.home-mode) .back-btn{
    background:rgba(255,253,245,.8);box-shadow:2px 3px 0 rgba(25,25,25,.12);border-color:#45423b;
  }
  body:not(.home-mode) .placement-tab.active,
  body:not(.home-mode) .view-tab.active,
  body:not(.home-mode) .graphic-tool.active{background:#45423b;color:#f8f4e9;}
  body:not(.home-mode) .item-art{border-right:2px solid rgba(52,49,43,.68);}
  body:not(.home-mode) .garment-stage{filter:drop-shadow(4px 6px 2px rgba(60,55,47,.13));}
  body:not(.home-mode) .garment-canvas-viewport::after{
    content:"";position:absolute;inset:8px;border:1px solid rgba(55,50,44,.17);transform:rotate(.2deg);pointer-events:none;
  }
  body:not(.home-mode) .canvas-control{background:#faf7ed;border-color:#4a463f;box-shadow:1px 2px 0 rgba(50,45,38,.2);}
  body:not(.home-mode) input,
  body:not(.home-mode) textarea,
  body:not(.home-mode) select{background:rgba(255,254,249,.76);border-color:#565149;}
  body:not(.home-mode) .config-btn,
  body:not(.home-mode) .inline-options,
  body:not(.home-mode) .sub-btn,
  body:not(.home-mode) .garment-canvas-viewport,
  body:not(.home-mode) .pattern-card,
  body:not(.home-mode) .sample-modal,
  body:not(.home-mode) .placement-tab,
  body:not(.home-mode) .view-tab,
  body:not(.home-mode) .graphic-tool,
  body:not(.home-mode) .icon-action,
  body:not(.home-mode) .back-btn,
  body:not(.home-mode) .canvas-control,
  body:not(.home-mode) input,
  body:not(.home-mode) textarea,
  body:not(.home-mode) select{border-color:transparent!important;outline:none;}
  body:not(.home-mode) .item-art{border-right-color:transparent;}
  body:not(.home-mode) .garment-canvas-viewport::after{display:none;}
  body:not(.home-mode) .inline-options{position:relative;}
  body:not(.home-mode) .inline-options::after{
    content:"✎";position:absolute;right:15px;top:10px;font:26px 'Kaushan Script';opacity:.18;transform:rotate(-14deg);pointer-events:none;
  }
  #app{
    max-width:1280px;
    margin:0 auto;
    padding:40px 60px 80px;
  }
  .logo{
    text-align:center;
    display:flex;
    justify-content:center;
    width:100%;
    cursor:pointer;
    margin:0 0 40px;
    user-select:none;
  }
  .logo img{
    display:block;
    width:min(220px,58vw);
    height:auto;
    margin:0 auto;
    mix-blend-mode:multiply;
    filter:grayscale(1) contrast(.88);
    opacity:.86;
  }
  .top-row{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-bottom:20px;
  }
  .back-btn{
    background:var(--cream);
    border:2px solid var(--ink);
    padding:10px 20px;
    font-family:'Poppins',sans-serif;
    font-weight:700;
    font-size:13px;
    letter-spacing:1px;
    text-transform:uppercase;
    cursor:pointer;
    border-radius:2px;
  }
  .back-btn:hover{
    transform:translateY(-2px);
    box-shadow:3px 3px 0 var(--ink);
  }
  .spacer{width:110px;}
  .top-actions{display:flex;align-items:center;justify-content:flex-end;gap:10px;flex-wrap:wrap;}
  .icon-action{display:flex;align-items:center;gap:8px;background:var(--cream);border:2px solid var(--ink);padding:9px 13px;font:700 11px 'Poppins',sans-serif;letter-spacing:.7px;text-transform:uppercase;cursor:pointer;}
  .icon-action:hover{transform:translateY(-2px);box-shadow:3px 3px 0 var(--ink);}
  .icon-action svg{width:18px;height:18px;overflow:visible;}
  .save-toast{position:fixed;right:24px;bottom:24px;background:var(--ink);color:#fff;padding:13px 18px;font-size:12px;font-weight:700;z-index:20;}
  .account-button{position:fixed;top:18px;right:22px;z-index:25;width:28px;height:28px;border:1px solid var(--ink);border-radius:50%;background:var(--cream);display:grid;place-items:center;cursor:pointer;box-shadow:1px 1px 0 var(--ink);}
  .account-button:hover{transform:translateY(-2px);}
  .account-button svg{width:14px;height:14px;}
  .music-button{position:fixed;top:18px;right:58px;z-index:25;width:28px;height:28px;border:1px solid var(--ink);border-radius:50%;background:var(--cream);display:grid;place-items:center;cursor:pointer;box-shadow:1px 1px 0 var(--ink);font-size:13px;}
  .music-button:hover{transform:translateY(-2px);}
  .music-button.playing{background:var(--ink);color:#fff;}
  .account-modal{width:min(760px,96vw);max-height:86vh;overflow:auto;}
  .account-tabs{display:flex;border-bottom:2px solid var(--ink);margin-bottom:20px;}
  .account-tab{background:var(--ink);color:#fff;padding:11px 20px;font-size:13px;font-weight:800;letter-spacing:1px;text-transform:uppercase;}
  .saved-designs{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px;}
  .saved-design-card{background:var(--cream);border:2px solid var(--ink);padding:16px;display:grid;grid-template-columns:72px 1fr;gap:14px;align-items:center;}
  .saved-design-icon{width:72px;height:72px;background:#fff;border:1px solid #bbb;display:grid;place-items:center;}
  .saved-design-icon svg{width:58px;height:58px;}
  .saved-design-name{font-size:15px;font-weight:800;text-transform:uppercase;}
  .saved-design-date{font-size:11px;color:#666;margin:4px 0 10px;}
  .saved-design-actions{display:flex;gap:7px;flex-wrap:wrap;}
  .saved-design-actions button{border:1.5px solid var(--ink);background:#fff;padding:6px 10px;font:700 10px 'Poppins';text-transform:uppercase;cursor:pointer;}
  .saved-design-actions .delete{background:var(--accent);color:#fff;border-color:var(--accent);}
  .empty-designs{grid-column:1/-1;background:rgba(255,255,255,.5);border:2px dashed #777;padding:35px;text-align:center;color:#666;}
  .account-login{max-width:430px;margin:10px auto 20px;}
  .account-login p{font-size:12px;color:#666;margin-bottom:18px;}
  .modal-backdrop{position:fixed;inset:0;background:rgba(20,20,20,.45);display:flex;align-items:center;justify-content:center;padding:20px;z-index:30;}
  .sample-modal{width:min(480px,100%);background:var(--green-bg);border:3px solid var(--ink);padding:28px;box-shadow:8px 8px 0 var(--ink);}
  .modal-head{display:flex;align-items:center;justify-content:space-between;gap:20px;margin-bottom:22px;}
  .modal-head h2{font-size:20px;letter-spacing:1.5px;text-transform:uppercase;margin:0;}
  .close-modal{border:0;background:transparent;font-size:27px;cursor:pointer;line-height:1;}

  /* HOME */
  .home-wrap{
    display:flex;
    gap:40px;
    align-items:center;
    flex-wrap:wrap;
  }
  .home-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:24px;
    flex:1 1 420px;
  }
  .cat-btn{
    background:var(--cream);
    border:2px solid var(--ink);
    padding:38px 20px;
    text-align:center;
    font-weight:700;
    font-size:16px;
    letter-spacing:1.5px;
    text-transform:uppercase;
    cursor:pointer;
    border-radius:2px;
    transition:transform .15s ease, box-shadow .15s ease;
  }
  .cat-btn:hover{
    transform:translateY(-3px);
    box-shadow:4px 4px 0 var(--ink);
  }
  .home-art{
    flex:1 1 420px;
    display:flex;
    justify-content:center;
  }
  .model-home{position:relative;width:min(1280px,96vw);margin:0 auto;display:grid;grid-template-columns:1fr 1fr;gap:42px;align-items:start;min-height:0;}
  .model-gender-column{min-width:0;}
  .model-home.gender-focused{grid-template-columns:minmax(0,720px);justify-content:center;}
  .model-home.gender-focused .model-gender-column:not(.selected-gender){display:none;}
  .model-home.gender-focused .selected-gender{width:100%;margin:0 auto;animation:centerSelectedGender .36s ease both;}
  .model-gender-title{text-align:center;margin:0 0 14px;font-size:17px;font-weight:900;letter-spacing:2px;text-transform:uppercase;}
  .model-group{position:relative;background:#f8f8f4;overflow:hidden;aspect-ratio:1000/1080;}
  .model-home-image{display:block;width:100%;height:100%;object-fit:cover;object-position:center center;filter:contrast(1.03);transition:filter .35s ease,opacity .35s ease;}
  .female-model-image{object-fit:contain;object-position:center bottom;transform:scale(1.05);transform-origin:center bottom;}
  .male-model-group .model-home-image{object-fit:contain;object-position:center bottom;}
  .female-model-group .hotspot-tee{top:27.5%;height:32.2%;}
  .female-model-group .hotspot-hoodie{top:22.1%;height:38.5%;}
  .female-model-group .hotspot-sweatshirt{top:27.5%;height:32.2%;}
  .female-model-group .hotspot-pants{top:59.7%;height:34.9%;}
  .model-action-video{position:absolute;inset:0;width:100%;height:100%;object-fit:contain;z-index:12;opacity:0;pointer-events:none;background:#f7f7f2;transition:opacity .16s ease;}
  .model-action-video.playing{opacity:1;}
  .model-hotspot{position:absolute;border:0;background:transparent;cursor:pointer;padding:0;z-index:3;}
  .model-hotspot::after{content:attr(data-label);position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);background:var(--ink);color:#fff;padding:8px 12px;font:800 11px 'Poppins';letter-spacing:1px;text-transform:uppercase;opacity:0;transition:opacity .18s;white-space:nowrap;}
  .model-hotspot:hover{outline:2px dashed var(--accent);background:rgba(224,86,47,.08);}
  .model-hotspot:hover::after{opacity:1;}
  .hotspot-tee{left:7%;top:19%;width:27%;height:36%;}
  .hotspot-hoodie{left:34%;top:13%;width:34%;height:43%;}
  .hotspot-sweatshirt{left:68%;top:19%;width:27%;height:36%;}
  .hotspot-pants{left:38%;top:55%;width:56%;height:39%;}
  .hotspot-fullzip{left:76%;top:19%;width:22%;height:39%;}
  .hotspot-denim{left:76%;top:56%;width:22%;height:39%;}
  .male-model-group .hotspot-tee{left:7%;top:20%;width:22%;height:39%;}
  .male-model-group .hotspot-hoodie{left:29%;top:12%;width:27%;height:46%;}
  .male-model-group .hotspot-sweatshirt{left:56%;top:20%;width:21%;height:39%;}
  .male-model-group .hotspot-pants{left:29%;top:57%;width:48%;height:39%;}
  .combined-model-home{display:block;width:min(1180px,100%);margin:0 auto;}
  .combined-model-group{position:relative;width:100%;aspect-ratio:3951/2464;background:#f8f8f4;overflow:hidden;}
  .combined-model-group .model-home-image{width:100%;height:100%;object-fit:contain;object-position:center;}
  .combined-model-group .men-tee{left:3%;top:20%;width:14%;height:39%;}
  .combined-model-group .men-hoodie{left:17%;top:14%;width:17%;height:46%;}
  .combined-model-group .men-sweatshirt{left:33%;top:20%;width:12%;height:39%;}
  .combined-model-group .men-fullzip{left:44%;top:20%;width:13%;height:40%;}
  .combined-model-group .men-sweatpants{left:17%;top:57%;width:28%;height:39%;}
  .combined-model-group .men-denim{left:44%;top:57%;width:13%;height:39%;}
  .combined-model-group .women-tee{left:59%;top:21%;width:13%;height:38%;}
  .combined-model-group .women-hoodie{left:71%;top:15%;width:14%;height:45%;}
  .combined-model-group .women-sweatshirt{left:85%;top:21%;width:13%;height:38%;}
  .combined-model-group .women-pants{left:71%;top:58%;width:27%;height:38%;}
  .model-home.throwing .model-home-image{filter:contrast(1.02) brightness(1.16);animation:modelReact .78s cubic-bezier(.2,.75,.25,1) forwards;transform-origin:50% 58%;}
  .model-home.throwing .model-hotspot{pointer-events:none;}
  .throw-flash{position:absolute;background:rgba(248,248,244,.88);border-radius:45%;z-index:2;animation:undressFlash .78s ease forwards;}
  .flying-garment{position:fixed;z-index:80;object-fit:contain;pointer-events:none;filter:drop-shadow(0 18px 18px rgba(0,0,0,.25));animation:throwToCamera .82s cubic-bezier(.2,.7,.15,1) forwards;}
  .model-home-caption{text-align:center;margin:-24px auto 28px;padding:0 15px;font-size:14px;font-weight:800;letter-spacing:3px;text-transform:uppercase;}
  @keyframes throwToCamera{0%{transform:translate(0,0) scale(.35) rotate(-12deg);opacity:.55}45%{transform:translate(calc(var(--tx)*.55),calc(var(--ty)*.55 - 30px)) scale(1.15) rotate(7deg);opacity:1}100%{transform:translate(var(--tx),var(--ty)) scale(4.5) rotate(0);opacity:0}}
  @keyframes undressFlash{0%{opacity:0;transform:scale(.8)}35%{opacity:1;transform:scale(1)}100%{opacity:0;transform:scale(1.25)}}
  @keyframes modelReact{0%{transform:scale(1) translateY(0)}18%{transform:scale(.985) translateY(5px)}42%{transform:scale(1.025) translateY(-10px)}72%{transform:scale(1.045) translateY(-4px)}100%{transform:scale(1.07) translateY(0);opacity:.82}}
  @keyframes centerSelectedGender{from{opacity:.78;transform:scale(.94)}to{opacity:1;transform:scale(1)}}
  .home-art img{
    width:100%;
    max-width:560px;
    height:auto;
    object-fit:contain;
    mix-blend-mode:multiply;
  }
  @media(max-width:850px){
    .model-home{grid-template-columns:1fr;gap:28px;width:min(680px,94vw);}
  }

  /* ITEM PAGE */
  .item-wrap{
    display:grid;
    grid-template-columns:minmax(0,1.82fr) minmax(360px,.88fr);
    gap:0;
    align-items:flex-start;
  }
  .item-art{
    display:flex;
    justify-content:center;
    padding-top:20px;
    padding-right:30px;
    border-right:4px solid var(--ink);
    position:sticky;
    top:20px;
  }
  .config-side{min-width:0;padding-left:30px;}
  .item-title{
    font-size:15px;
    font-weight:800;
    letter-spacing:2px;
    text-transform:uppercase;
    margin-bottom:24px;
    opacity:.7;
  }
  .config-grid{
    flex:1 1 400px;
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:14px;
  }
  .config-btn{
    background:var(--cream);
    border:2px solid var(--ink);
    padding:15px 18px;
    text-align:center;
    cursor:pointer;
    border-radius:2px;
    transition:transform .15s ease, box-shadow .15s ease;
  }
  .config-btn:hover{
    transform:translateY(-3px);
    box-shadow:4px 4px 0 var(--ink);
  }
  .config-btn .name{
    font-weight:700;
    font-size:15px;
    letter-spacing:1.5px;
    text-transform:uppercase;
    display:block;
  }
  .config-btn .value{
    display:block;
    margin-top:4px;
    font-size:12px;
    font-weight:400;
    color:#d6281f;
    text-transform:none;
    letter-spacing:0;
  }
  .config-btn .value.unset{
    color:#8a8a8a;
    font-style:italic;
  }
  .sub-btn.selected{color:#d6281f;}
  .config-btn.active{
    background:#fff;
    border-color:var(--accent);
    box-shadow:4px 4px 0 var(--ink);
  }
  .inline-options{
    grid-column:1 / -1;
    background:rgba(250,248,240,.55);
    border:2px solid var(--ink);
    padding:24px;
    margin-top:-10px;
  }
  .inline-options .sub-heading{
    font-size:14px;
    margin:0;
  }
  .inline-options-head{display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:16px;}
  .upload-btn{display:inline-flex;align-items:center;gap:8px;background:var(--ink);color:var(--cream);border:2px solid var(--ink);padding:10px 16px;font-size:12px;font-weight:700;letter-spacing:1px;text-transform:uppercase;cursor:pointer;white-space:nowrap;}
  .upload-btn:hover{background:var(--accent);border-color:var(--accent);}
  .upload-btn input{display:none;}
  .upload-note{font-size:10px;opacity:.65;margin-top:10px;}
  .artwork-inspector{display:grid;grid-template-columns:190px minmax(0,1fr);gap:14px;margin:18px 0 24px;padding:14px;background:rgba(255,255,255,.55);overflow:visible;}
  .artwork-thumb{background:#fff;border:2px solid var(--ink);padding:8px;text-align:center;cursor:pointer;}
  .artwork-thumb img{display:block;width:100%;height:120px;object-fit:contain;}
  .artwork-thumb svg{display:block!important;width:100%!important;height:120px!important;overflow:hidden!important;background:#fff;}
  .artwork-thumb.active{border-color:var(--accent);box-shadow:3px 3px 0 var(--ink);}
  .artwork-fields{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1fr);gap:10px;min-width:0;}
  .artwork-field{min-width:0;}
  .artwork-field label{display:block;font-size:9px;font-weight:700;margin-bottom:4px;text-transform:uppercase;white-space:normal;}
  .artwork-input-wrap{display:flex;border:1.5px solid #aaa;background:#fff;}
  .artwork-input-wrap input{width:100%;min-width:0;border:0;padding:8px 2px;background:#fff;color:#111!important;-webkit-text-fill-color:#111!important;opacity:1;font:700 11px 'Poppins',sans-serif;text-align:center;appearance:textfield;-moz-appearance:textfield;}
  .artwork-input-wrap input::-webkit-inner-spin-button,.artwork-input-wrap input::-webkit-outer-spin-button{-webkit-appearance:none;margin:0;}
  .artwork-input-wrap span{padding:8px 4px;background:#f2f0e9;font-size:8px;flex:0 0 auto;}
  .technique-layer-tools{grid-column:1/-1;border-top:1px dashed rgba(26,26,26,.45);padding-top:12px;margin-top:4px;}
  .layer-upload-btn{display:inline-flex;background:var(--ink);color:#fff;padding:9px 12px;font-size:10px;font-weight:700;text-transform:uppercase;cursor:pointer;}
  .layer-upload-btn input{display:none;}
  .layer-technique{width:100%;margin-top:7px;padding:6px;border:1.5px solid var(--ink);background:var(--cream);font:700 10px 'Poppins',sans-serif;}
  .layer-remove{float:right;border:0;background:var(--accent);color:#fff;width:22px;height:22px;font-weight:800;cursor:pointer;}
  .preview-wrap{text-align:center;}
  .garment-stage{
    background:#fff;
    padding:20px;
    width:94%;
    margin:0 auto 22px;
    display:block;
  }
  .garment-stage svg{max-width:100%;height:auto;}

function garmentSVG(type, color, size, customization={}){

        <circle class="graphic-resize-handle" cx="${g.x}" cy="${g.y+g.h}" r="2.8" fill="#fff" stroke="#e0562f" stroke-width="1.2" onpointerdown="startGraphicResize(event,${g._index},'sw')" style="cursor:nesw-resize"/>
        <circle class="graphic-resize-handle" cx="${g.x+g.w}" cy="${g.y+g.h}" r="2.8" fill="#fff" stroke="#e0562f" stroke-width="1.2" onpointerdown="startGraphicResize(event,${g._index},'se')" style="cursor:nwse-resize"/>
      `:''}` : ''}
  `).join('');
  const photoFiles = {tee:garmentView==='Back'?'tee-back.png':'tee.png',hoodie:garmentView==='Back'?'hoodie-back.png':'hoodie.png',sweatshirt:garmentView==='Back'?'sweatshirt-back.png':'sweatshirt.png',sweatpants:'sweatpants.png'};
  const colorMap = {
    'Off White':[.93,.91,.86],
    'Powder Blue':[.66,.78,.86], 'Cream':[.88,.79,.65], 'Forest Green':[.27,.43,.24],

  const colors={'Off White':'#eee9dc','Powder Blue':'#a9c6da','Cream':'#dfc9a8','Forest Green':'#456b3d','Black':'#111','White':'#f4f4ef','Red':'#a92f2a'};

  let colorName=zone==='Back' ? customization.BodyBackColor : customization.BodyFrontColor;

      ? '<path d="M25 145C50 137 67 111 82 76Q91 55 100 52Q109 55 118 76C133 111 150 137 175 145L170 182H30Z"/>'

  }else if(type==='sweatpants'){

  }else{
    shape='<path d="M72 27L48 40L32 75L55 88L68 67V182H132V67L145 88L168 75L152 40L128 27Q120 48 100 48Q80 48 72 27Z"/>';
  }
  const graphics=(customization.graphics||[]).map((g,index)=>({...g,_index:index})).filter(g=>!g.hidden&&(g.zone||'Front')===zone).map(g=>`
    ${g.crop?`<clipPath id="previewCrop${g._index}"><rect x="${g.crop.x}" y="${g.crop.y}" width="${g.crop.w}" height="${g.crop.h}"/></clipPath>`:''}
    <image href="${g.src}" x="${g.sourceX??g.x}" y="${g.sourceY??g.y}" width="${g.sourceW??g.w}" height="${g.sourceH??g.h}" ${g.crop?`clip-path="url(#previewCrop${g._index})"`:''} transform="rotate(${g.rotation||0} ${(g.sourceX??g.x)+(g.sourceW??g.w)/2} ${(g.sourceY??g.y)+(g.sourceH??g.h)/2})" preserveAspectRatio="xMidYMid meet"/>`).join('');
  const marks=(customization.marks||[])
    .filter(m=>(m.zone||'Front')===zone)
    .map(m=>sizedLiveMarkSVG(m.type,m.x,m.y,m.size,m.color))
    .join('');
  const actualPatternFiles={
    tee:{
      Front:'tee-pattern-front-1.png',
      Back:'tee-pattern-back-1.png',
      'Left Sleeve':'tee-pattern-sleeve-1.png',
      'Right Sleeve':'tee-pattern-sleeve-1.png',
      Rib:'tee-pattern-neck-rib-1.png'
    },
    hoodie:{
      Front:'hoodie-pattern-front-1.png',
      Back:'hoodie-pattern-back-1.png',
      'Left Sleeve':'hoodie-pattern-sleeve-1.png',
      'Right Sleeve':'hoodie-pattern-sleeve-1.png',
      Hood:'hoodie-pattern-hood-1.png',
      Pocket:'hoodie-pattern-pocket-1.png'
    },
    sweatshirt:{
      'Left Sleeve':'hoodie-pattern-sleeve-1.png',
      'Right Sleeve':'hoodie-pattern-sleeve-1.png'
    }
  };
  const actualFile=actualPatternFiles[type]?.[zone];
  if(actualFile) return `<svg viewBox="0 0 200 205" aria-label="${zone} production pattern">
    <defs><clipPath id="patternArtworkClip">${shape}</clipPath></defs>

    <g clip-path="url(#patternArtworkClip)">${graphics}${marks}</g>

    <defs><clipPath id="patternArtworkClip">${shape}</clipPath></defs>

}

function render(){
  preserveArtworkEditorDraft();
  const app = document.getElementById('app');
  document.body.classList.toggle('home-mode',state.view==='home');
  const music=document.getElementById('background-music'),musicPlaying=music&&!music.paused;
  let html = `<button id="music-toggle" class="music-button ${musicPlaying?'playing':''}" onclick="toggleBackgroundMusic()" title="${musicPlaying?'Pause':'Play'} background music" aria-label="Toggle background music">${musicPlaying?'♫':'♪'}</button><button class="account-button" onclick="openAccount()" title="My Account" aria-label="My Account"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 21c.7-4.5 3.4-7 8-7s7.3 2.5 8 7"/></svg></button><div class="logo" onclick="goHome()"><img src="assets/spool-logo-1.png" alt="Spool"></div>`;

  if(state.view === 'home'){
    html += renderHome();
  } else if(state.view === 'item'){
    html += renderItem();
  } else if(state.view === 'suboption'){
    html += renderSubOption();
  } else if(state.view === 'contact'){
    html += renderContact();
  } else if(state.view === 'questions'){
    html += renderQuestions();
  }

  if(state.accountOpen) html += renderAccountModal();
  /* Render the artwork editor at app level so it is never hidden inside the
     configurator's scrolling/stacking context. */
  if(state.artworkEditorOpen) html += renderArtworkEditorModal();
  app.innerHTML = html;
  if(state.artworkEditorOpen) requestAnimationFrame(initArtworkPixelEditor);
}

function getSavedDesignLibrary(){
  try{return JSON.parse(localStorage.getItem('spoolSavedDesignLibrary')||'[]');}
  catch(error){return [];}
}
function openSpoolDB(){return new Promise((resolve,reject)=>{const request=indexedDB.open('spool-design-db',1);request.onupgradeneeded=()=>{const db=request.result;if(!db.objectStoreNames.contains('designs'))db.createObjectStore('designs');};request.onsuccess=()=>resolve(request.result);request.onerror=()=>reject(request.error);});}
async function spoolDBPut(key,value){const db=await openSpoolDB();return new Promise((resolve,reject)=>{const tx=db.transaction('designs','readwrite');tx.objectStore('designs').put(value,key);tx.oncomplete=()=>{db.close();resolve();};tx.onerror=()=>reject(tx.error);});}
async function spoolDBGet(key){const db=await openSpoolDB();return new Promise((resolve,reject)=>{const tx=db.transaction('designs','readonly'),request=tx.objectStore('designs').get(key);request.onsuccess=()=>{db.close();resolve(request.result);};request.onerror=()=>reject(request.error);});}
async function spoolDBDelete(key){const db=await openSpoolDB();return new Promise((resolve,reject)=>{const tx=db.transaction('designs','readwrite');tx.objectStore('designs').delete(key);tx.oncomplete=()=>{db.close();resolve();};tx.onerror=()=>reject(tx.error);});}
function cleanDesignForStorage(value){return JSON.parse(JSON.stringify(value,(key,item)=>key==='editorDraft'||key==='originalSrc'?undefined:item));}
function escapeText(value){return String(value??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function getAccountUser(){
  try{return JSON.parse(localStorage.getItem('spoolAccountUser')||'null');}catch(error){return null;}
}
function loginAccount(){
  const email=document.getElementById('account-email')?.value.trim();
  const password=document.getElementById('account-password')?.value||'';
  if(!email||!email.includes('@')){alert('Please enter a valid email address.');return;}
  if(password.length<4){alert('Password must be at least 4 characters.');return;}
  localStorage.setItem('spoolAccountUser',JSON.stringify({email,loggedInAt:new Date().toISOString()}));
  render();
}
function logoutAccount(){localStorage.removeItem('spoolAccountUser');render();}
function openDesignRequest(id){
  let requests=[];try{requests=JSON.parse(localStorage.getItem('spoolDesignRequests')||'[]');}catch(error){}
  const request=requests.find(r=>r.id===id);if(!request)return;
  state.productKey=request.productKey;state.view='item';state.accountOpen=false;state.configurable='Reference & Design Studio';state.referenceStudio[request.productKey]={...state.referenceStudio[request.productKey],...request.studio};render();
}
function deleteDesignRequest(id){
  if(!confirm('Delete this design request?'))return;
  let requests=[];try{requests=JSON.parse(localStorage.getItem('spoolDesignRequests')||'[]');}catch(error){}
  localStorage.setItem('spoolDesignRequests',JSON.stringify(requests.filter(r=>r.id!==id)));render();
}

function artworkFormatLabel(graphic){
  if(graphic?.fileFormat) return String(graphic.fileFormat).toUpperCase();
  const match=String(graphic?.src||'').match(/^data:image\/([^;,]+)/i);
  return match?match[1].replace('jpeg','jpg').replace('svg+xml','svg').toUpperCase():'IMAGE';
}
function artworkFileMeta(graphic){
  const dimensions=graphic?.pixelWidth&&graphic?.pixelHeight?`${graphic.pixelWidth} × ${graphic.pixelHeight} px`:'Dimensions unavailable';
  return `${artworkFormatLabel(graphic)} · ${dimensions}`;
}
function ensureArtworkFileMetadata(key){
  (state.uploads[key]||[]).forEach(graphic=>{
    if((graphic.pixelWidth&&graphic.pixelHeight)||graphic.metadataLoading||graphic.metadataFailed||!graphic.src)return;
    graphic.metadataLoading=true;
    const image=new Image();
    image.onload=()=>{
      graphic.pixelWidth=image.naturalWidth||0;graphic.pixelHeight=image.naturalHeight||0;
      graphic.fileFormat=artworkFormatLabel(graphic);graphic.metadataLoading=false;
      if(state.view==='item'&&state.productKey===key)render();
    };
    image.onerror=()=>{graphic.metadataLoading=false;graphic.metadataFailed=true;};
    image.src=graphic.src;
  });
}

function pushHistory(){
  const key=state.productKey;
  if(!key)return;
  const snapshot=JSON.stringify({
    selections:state.selections[key],uploads:state.uploads[key],marks:state.marks[key],decorationReferences:state.decorationReferences[key],configReferences:state.configReferences[key],decorationReferenceNotes:state.decorationReferenceNotes[key],configReferenceNotes:state.configReferenceNotes[key],packageReferences:state.packageReferences[key],packageReferenceNotes:state.packageReferenceNotes[key],fitSpecs:state.fitSpecs[key],referenceStudio:state.referenceStudio[key]
  });
  const stack=state.history[key];
  if(stack[stack.length-1]!==snapshot)stack.push(snapshot);
  if(stack.length>40)stack.shift();
}
function updateMusicButton(){
  const audio=document.getElementById('background-music'),button=document.getElementById('music-toggle');
  if(!audio||!button)return;
  button.classList.toggle('playing',!audio.paused);
  button.textContent=audio.paused?'♪':'♫';
  button.title=`${audio.paused?'Play':'Pause'} background music`;
}
function toggleBackgroundMusic(){
  const audio=document.getElementById('background-music');
  if(!audio)return;
  audio.volume=.24;
  if(audio.paused)audio.play().then(updateMusicButton).catch(()=>{});
  else{audio.pause();updateMusicButton();}
}
function ensureBackgroundMusic(){
  const audio=document.getElementById('background-music');
  if(audio&&audio.paused){audio.volume=.24;audio.play().then(updateMusicButton).catch(()=>{});}
}
function undoDesign(){
  const key=state.productKey;
  if(!key||!state.history[key].length)return;
  const previous=JSON.parse(state.history[key].pop());
  state.selections[key]=previous.selections||{};
  state.uploads[key]=previous.uploads||[];
  state.marks[key]=previous.marks||[];
  state.decorationReferences[key]=previous.decorationReferences||[];
  state.configReferences[key]=previous.configReferences||{fit:[],wash:[]};
  state.decorationReferenceNotes[key]=previous.decorationReferenceNotes||{};
  state.configReferenceNotes[key]=previous.configReferenceNotes||{fit:'',wash:''};
  state.packageReferences[key]=previous.packageReferences||{trim:{},branding:{}};
  state.packageReferenceNotes[key]=previous.packageReferenceNotes||{trim:{},branding:{}};
  state.fitSpecs[key]=previous.fitSpecs||{};
  state.referenceStudio[key]=previous.referenceStudio||state.referenceStudio[key];
  state.selectedGraphic[key]=null;
  state.brushMode=null;state.areaSelectMode=false;
  render();

let modelVideoTimer=null;
function focusModelAndStart(event,key,useVideo=false){
  const hero=document.getElementById('model-home');
  const target=event.currentTarget;
  const selectedColumn=target.closest('.model-gender-column');
  if(!hero)return;
  if(!selectedColumn){throwGarment({currentTarget:target},key);return;}
  if(hero.classList.contains('gender-focused'))return;
  hero.classList.add('gender-focused');
  selectedColumn.classList.add('selected-gender');
  setTimeout(()=>{
    const focusedEvent={currentTarget:target};
    if(useVideo)playModelVideo(focusedEvent,key);
    else throwGarment(focusedEvent,key);
  },380);
}
function playModelVideo(event,key){
  ensureBackgroundMusic();
  const hero=document.getElementById('model-home');
  const video=document.getElementById('tee-action-video');
  if(!hero||!video||hero.classList.contains('throwing'))return;
  hero.classList.add('throwing');
  video.classList.add('playing');
  video.currentTime=0;
  video.playbackRate=1.35;
  const playback=video.play();
  if(playback&&playback.catch) playback.catch(()=>{
    hero.classList.remove('throwing');video.classList.remove('playing');throwGarment(event,key);
  });
  clearTimeout(modelVideoTimer);
  modelVideoTimer=setTimeout(()=>finishModelVideo(key),9000);
}
function finishModelVideo(key){
  clearTimeout(modelVideoTimer);
  if(state.view==='home'){resetProductDesign(key);goItem(key);}
}
function throwGarment(event,key){
  ensureBackgroundMusic();
  const hero=document.getElementById('model-home');
  if(!hero||hero.classList.contains('throwing'))return;
  hero.classList.add('throwing');
  const target=event.currentTarget,rect=target.getBoundingClientRect(),heroRect=hero.getBoundingClientRect();
  const flash=document.createElement('div');
  flash.className='throw-flash';
  flash.style.cssText=`left:${rect.left-heroRect.left}px;top:${rect.top-heroRect.top}px;width:${rect.width}px;height:${rect.height}px`;
  hero.appendChild(flash);
  const image=document.createElement('img');
  image.className='flying-garment';
  image.src=`assets/${PRODUCTS[key].svg}.png`;
  const w=Math.max(120,rect.width*.62),h=Math.max(120,rect.height*.62);
  const left=rect.left+(rect.width-w)/2,top=rect.top+(rect.height-h)/2;
  image.style.cssText=`left:${left}px;top:${top}px;width:${w}px;height:${h}px;--tx:${window.innerWidth/2-(left+w/2)}px;--ty:${window.innerHeight/2-(top+h/2)}px`;
  document.body.appendChild(image);
  setTimeout(()=>{resetProductDesign(key);goItem(key);},760);
  setTimeout(()=>image.remove(),950);
}

async function saveDesign(addToLibrary=true){
  const key=state.productKey;
  try{
    const savedAt=new Date().toISOString();
    const library=addToLibrary?getSavedDesignLibrary():[];
    let designName=state.designFileNames[key]||'';
    let designId=state.designFileIds[key]||null;
    if(addToLibrary&&!designId&&designName){const legacyMatch=library.find(item=>item.productKey===key&&item.name===designName);if(legacyMatch)designId=legacyMatch.id;}
    let existingIndex=designId?library.findIndex(item=>item.id===designId):-1;
    if(addToLibrary){
      if(existingIndex>=0){
        designName=library[existingIndex].name||designName||`${PRODUCTS[key].label} Design`;
      }else{

function selectOption(configurable, value){
  pushHistory();
  const selections=state.selections[state.productKey];
  const isSame=selections[configurable]===value;
  if(isSame) delete selections[configurable];
  else selections[configurable]=value;
  const selectedValue=isSame?null:value;
  if(configurable==='AllFabric'){
    const fabricKeys=['BodyFabric','SleeveFabric',...((state.productKey==='hoodie'||state.productKey==='fullzip')?['PocketFabric','HoodFabric']:[])];
    fabricKeys.forEach(key=>{
      if(selectedValue) selections[key]=selectedValue; else delete selections[key];
    });
  }
  if(configurable==='AllColor'){
    const colorKeys=['BodyFrontColor','BodyBackColor','LeftSleeveColor','RightSleeveColor','BodyRibColor',...(state.productKey==='tee'?[]:['SleeveRibColor']),...((state.productKey==='hoodie'||state.productKey==='fullzip')?['PocketColor','HoodColor']:[])];
    colorKeys.forEach(key=>{
      if(selectedValue) selections[key]=selectedValue; else delete selections[key];
    });
  }
  state.view='item';
  const isArtwork=configurable.startsWith('Print') || configurable.startsWith('Technique');
  if(configurable==='Fit' || configurable==='Waistband') state.configurable='Fit (Spec) & Construction';
  else if(configurable.endsWith('Color') || configurable.endsWith('Rib') || configurable.endsWith('Fabric')) state.configurable='Fabric & Color';
  else if(isArtwork) state.configurable='Artwork & Technique';
  else state.configurable='Wash & Finish';
  if(configurable.startsWith('Technique')){
    const brushTypes={'Rhinestones':'rhinestone','Pearls':'pearls','Stud':'stud','Hand Stitch':'hand-stitch'};
    state.brushMode=selectedValue ? (brushTypes[selectedValue] || null) : null;
  }
  if(configurable === 'Distressed') state.brushMode = selectedValue && selectedValue !== 'None' ? 'distress' : null;
  render();
}

  const sourceX=parent.sourceX??parent.x,sourceY=parent.sourceY??parent.y,sourceW=parent.sourceW??parent.w,sourceH=parent.sourceH??parent.h;
  const px=sourceX+(x/e.canvas.width)*sourceW,py=sourceY+(y/e.canvas.height)*sourceH,pw=(w/e.canvas.width)*sourceW,ph=(h/e.canvas.height)*sourceH;
  parent.id=parent.id||`art-${Date.now()}-base`;
  const technique=document.getElementById('detail-layer-technique')?.value||'Patch',src=detail.toDataURL('image/png');
  pushHistory();
  const detailIndex=insertArtworkInPlacementOrder({id:`detail-${Date.now()}`,parentId:parent.id,isTechniqueLayer:true,lockedToParent:true,detailLayer:true,src,originalSrc:src,x:px,y:py,w:pw,h:ph,baseW:pw,baseH:ph,scale:100,rotation:parent.rotation||0,technique,locked:false,zone:parent.zone||state.activeZone,fileFormat:'PNG',pixelWidth:w,pixelHeight:h,note:`Selected detail from Artwork ${index+1}; ${cutFromBase?'cut from base':'overlay on base'}.`});
  if(cutFromBase){if(e.selectionMask){const image=e.ctx.getImageData(0,0,e.canvas.width,e.canvas.height);for(let i=0;i<e.selectionMask.length;i++)if(e.selectionMask[i])image.data[i*4+3]=0;e.ctx.putImageData(image,0,0);}else e.ctx.clearRect(x,y,w,h);pushArtworkPixelHistory();detectArtworkColors();}
  clearArtworkSelection();
  parent.editorDraft=e.canvas.toDataURL('image/png');
  state.selectedGraphic[key]=detailIndex;
  alert(`Artwork ${detailIndex+1} created as ${technique}. Later placements were renumbered automatically. Click Apply Changes to finish.`);
}
function loadArtworkPixelSnapshot(src,after){
  const e=artworkPixelEditor;if(!e)return;const img=new Image();img.onload=()=>{e.canvas.width=img.naturalWidth;e.canvas.height=img.naturalHeight;e.ctx=e.canvas.getContext('2d',{willReadFrequently:true});e.ctx.clearRect(0,0,e.canvas.width,e.canvas.height);e.ctx.drawImage(img,0,0);after?.();};img.src=src;
}
function undoArtworkPixels(){const e=artworkPixelEditor;if(!e||e.undo.length<2)return;e.redo.push(e.undo.pop());loadArtworkPixelSnapshot(e.undo[e.undo.length-1],detectArtworkColors);}
function redoArtworkPixels(){const e=artworkPixelEditor;if(!e||!e.redo.length)return;const src=e.redo.pop();e.undo.push(src);loadArtworkPixelSnapshot(src,detectArtworkColors);}
function resetArtworkPixels(){const e=artworkPixelEditor,g=state.uploads[state.productKey]?.[state.artworkEditorIndex];if(!e||!g)return;loadArtworkPixelSnapshot(g.originalSrc||g.src,()=>{pushArtworkPixelHistory();detectArtworkColors();});clearArtworkSelection();}
function applyArtworkPixelEdits(){
  const e=artworkPixelEditor,g=state.uploads[state.productKey]?.[state.artworkEditorIndex];if(!e||!g)return;
  pushHistory();g.src=e.canvas.toDataURL('image/png');g.palette=[...(e.palette||[])];g.fileFormat='PNG';g.pixelWidth=e.canvas.width;g.pixelHeight=e.canvas.height;g.editorDraft=null;g.crop=null;g.sourceX=null;g.sourceY=null;g.sourceW=null;g.sourceH=null;
  artworkPixelEditor=null;state.artworkEditorOpen=false;state.artworkEditorIndex=null;render();
}
function downloadEditedArtwork(){
  const e=artworkPixelEditor;if(!e)return;e.canvas.toBlob(blob=>{const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`${state.productKey}-artwork-${(state.artworkEditorIndex??0)+1}-edited.png`;a.click();setTimeout(()=>URL.revokeObjectURL(a.href),1000);},'image/png');
}

function selectGraphic(index){
  const g=state.uploads[state.productKey]?.[index];
  state.selectedGraphic[state.productKey]=index;
  if(g){state.activeZone=g.zone||'Front';if(state.activeZone==='Front'||state.activeZone==='Back')state.garmentView=state.activeZone;}
  render();
}
let artworkReorderIndex=null;
function startArtworkReorder(event,index){
  artworkReorderIndex=index;event.currentTarget.classList.add('dragging');event.dataTransfer.effectAllowed='move';event.dataTransfer.setData('text/plain',String(index));
}
function endArtworkReorder(event){event.currentTarget.classList.remove('dragging');artworkReorderIndex=null;}
function dropArtworkReorder(event,targetIndex){
  event.preventDefault();const key=state.productKey,from=artworkReorderIndex??Number(event.dataTransfer.getData('text/plain'));
  if(!Number.isInteger(from)||from===targetIndex||!state.uploads[key]?.[from]||!state.uploads[key]?.[targetIndex])return;
  if((state.uploads[key][from].zone||'Front')!==(state.uploads[key][targetIndex].zone||'Front'))return;
  pushHistory();const selectedId=state.uploads[key][state.selectedGraphic[key]]?.id;
  const [moved]=state.uploads[key].splice(from,1);state.uploads[key].splice(targetIndex,0,moved);
  state.selectedGraphic[key]=selectedId?state.uploads[key].findIndex(g=>g.id===selectedId):null;artworkReorderIndex=null;render();
}
function toggleArtworkVisibility(index){
  const key=state.productKey,g=state.uploads[key]?.[index];if(!g)return;
  pushHistory();g.hidden=!g.hidden;
  if(g.hidden&&state.selectedGraphic[key]===index)state.selectedGraphic[key]=null;
  render();
}
function updateArtworkNote(value){
  const g=state.uploads[state.productKey]?.[state.artworkEditorIndex];
  if(g)g.note=value;
}
function getArtworkCalibration(graphic){
  const key=state.productKey;
  const fit=state.selections[key].Fit||'Regular';
  const specs=getFitSpecs(key,fit,state.fitSize||'M');
  const zone=graphic.zone||'Front';
  if(zone.includes('Sleeve')) return {physicalW:specs.Chest*.72,physicalH:specs.Sleeve,unitsW:132,unitsH:162,originX:34,originY:18};
  if(zone==='Hood') return {physicalW:specs.Chest*.72,physicalH:14,unitsW:72,unitsH:65,originX:64,originY:0};
  return {physicalW:specs.Chest,physicalH:specs.Length,unitsW:80,unitsH:150,originX:60,originY:30};
}
function getArtworkMetrics(graphic){
  const c=getArtworkCalibration(graphic);
  return {
    width:graphic.w*c.physicalW/c.unitsW,
    height:graphic.h*c.physicalH/c.unitsH,
    left:(graphic.x-c.originX)*c.physicalW/c.unitsW,
    top:(graphic.y-c.originY)*c.physicalH/c.unitsH
  };
}
function translateGraphicBy(index,dx,dy,recordHistory=true){
  const key=state.productKey,g=state.uploads[key]?.[index];
  if(!g||g.locked)return false;
  if(recordHistory)pushHistory();
  const move=(item)=>{
    item.x=(item.x||0)+dx;item.y=(item.y||0)+dy;
    if(item.sourceX!==undefined){item.sourceX+=dx;item.sourceY+=dy;}
    if(item.crop){item.crop={...item.crop,x:item.crop.x+dx,y:item.crop.y+dy};}
  };
  move(g);
  if(!g.isTechniqueLayer&&g.id)state.uploads[key].forEach(child=>{if(child.parentId===g.id&&child.lockedToParent)move(child);});
  return true;
}
function alignGraphicAt(index,axis,mode){
  const key=state.productKey,g=state.uploads[key]?.[index];
  if(!g||g.locked)return;
  const c=getArtworkCalibration(g);
  const target=axis==='x'
    ?(mode==='start'?c.originX:mode==='center'?c.originX+(c.unitsW-g.w)/2:c.originX+c.unitsW-g.w)
    :(mode==='start'?c.originY:mode==='center'?c.originY+(c.unitsH-g.h)/2:c.originY+c.unitsH-g.h);
  const dx=axis==='x'?target-g.x:0,dy=axis==='y'?target-g.y:0;
  state.selectedGraphic[key]=index;
  if(translateGraphicBy(index,dx,dy,true))render();
}
function nudgeSelectedGraphic(dx,dy){
  const key=state.productKey,index=state.selectedGraphic[key];
  if(index===null||!state.uploads[key]?.[index])return false;
  if(!translateGraphicBy(index,dx,dy,true))return false;
  render();
  return true;
}
function updateGraphicMetric(metric,value){
  const key=state.productKey, index=state.selectedGraphic[key];
  const g=state.uploads[key][index];
  if(!g) return;
  pushHistory();
  const number=Number(value);
  if(!Number.isFinite(number)) return;
  const c=getArtworkCalibration(g);
  if(metric==='width') g.w=Math.max(2,number*c.unitsW/c.physicalW);
  else if(metric==='height') g.h=Math.max(2,number*c.unitsH/c.physicalH);
  else if(metric==='rotation') g.rotation=number;
  else if(metric==='left') g.x=c.originX+number*c.unitsW/c.physicalW;
  else if(metric==='top') g.y=c.originY+number*c.unitsH/c.physicalH;
  else if(metric==='scale'){
    g.scale=Math.max(5,number);
    g.baseW=g.baseW||g.w; g.baseH=g.baseH||g.h;
    g.w=g.baseW*g.scale/100; g.h=g.baseH*g.scale/100;
  }
  render();
}

function resizeGraphic(scale){
  const key = state.productKey;
  const index = state.selectedGraphic[key];
  if(index === null || !state.uploads[key][index]) return;
  const g = state.uploads[key][index];
  const centerX = g.x + g.w/2, centerY = g.y + g.h/2;
  // Allow oversized / all-over artwork. Anything outside the garment remains
  // clipped by the garment mask, just like a real print placement preview.
  g.w = Math.max(6,Math.min(190,g.w*scale));
  g.h = Math.max(6,Math.min(200,g.h*scale));
  g.baseW=g.baseW||g.w; g.baseH=g.baseH||g.h;
  g.scale=Math.round(((g.w/g.baseW+g.h/g.baseH)/2)*100);
  g.x = centerX-g.w/2; g.y = centerY-g.h/2;
  render();
}

function duplicateGraphic(){
  const key=state.productKey,index=state.selectedGraphic[key];
  const source=state.uploads[key][index];
  if(!source)return;
  pushHistory();
  const stamp=Date.now(),offset=5;
  const clone=JSON.parse(JSON.stringify(source));
  const oldId=source.id;
  clone.id=`art-copy-${stamp}`;
  clone.parentId=source.parentId||null;
  clone.x+=offset;clone.y+=offset;
  if(clone.sourceX!==undefined){clone.sourceX+=offset;clone.sourceY+=offset;}
  if(clone.crop){clone.crop.x+=offset;clone.crop.y+=offset;}
  let cloneIndex=insertArtworkInPlacementOrder(clone);
  if(!source.isTechniqueLayer&&oldId){
    state.uploads[key].filter(g=>g.parentId===oldId).forEach((child,i)=>{
      const childClone=JSON.parse(JSON.stringify(child));
      childClone.id=`layer-copy-${stamp}-${i}`;childClone.parentId=clone.id;
      childClone.x+=offset;childClone.y+=offset;
      if(childClone.sourceX!==undefined){childClone.sourceX+=offset;childClone.sourceY+=offset;}
      if(childClone.crop){childClone.crop.x+=offset;childClone.crop.y+=offset;}
      insertArtworkInPlacementOrder(childClone,false);
    });
  }
  cloneIndex=state.uploads[key].findIndex(g=>g.id===clone.id);
  state.selectedGraphic[key]=cloneIndex;
  render();
}
function duplicateGraphicAt(index){state.selectedGraphic[state.productKey]=index;duplicateGraphic();}

function removeGraphic(){
  const key = state.productKey;
  const index = state.selectedGraphic[key];
  if(index === null) return;
  deleteGraphic(index);
}
function deleteGraphic(index){
  const key=state.productKey, target=state.uploads[key][index];
  if(!target) return;
  pushHistory();
  const records=state.uploads[key].map((g,i)=>({graphic:g,index:i})).filter(r=>r.index===index || (!target.isTechniqueLayer&&target.id&&r.graphic.parentId===target.id));
  state.deletedGraphics[key].push(records);
  const removeIndices=new Set(records.map(r=>r.index));
  state.uploads[key]=state.uploads[key].filter((g,i)=>!removeIndices.has(i));
  state.selectedGraphic[key]=null;
  render();
}
function undoDeleteGraphic(){
  const key=state.productKey,records=state.deletedGraphics[key].pop();
  if(!records) return;
  records.sort((a,b)=>a.index-b.index).forEach(r=>state.uploads[key].splice(Math.min(r.index,state.uploads[key].length),0,r.graphic));
  state.selectedGraphic[key]=records[0].index;
  render();
}

function selectedUploadLocked(){
  const key=state.productKey;
  const index=state.selectedGraphic[key];
  return index!==null && state.uploads[key][index] ? !!state.uploads[key][index].locked : false;
}

function toggleGraphicLock(){
  const key=state.productKey;
  const index=state.selectedGraphic[key];
  if(index===null || !state.uploads[key][index]) return;
  state.uploads[key][index].locked=!state.uploads[key][index].locked;
  render();
}
function toggleGraphicLockAt(index){state.selectedGraphic[state.productKey]=index;toggleGraphicLock();}

function undoMark(){
  state.marks[state.productKey].pop();
  render();
}

function submitContact(){
  state.contactSubmitted = true;
  render();
}

function toggleFaq(i){
  const el = document.getElementById('faq-'+i);
  el.classList.toggle('open');
  const icon = el.querySelector('.faq-icon');
  icon.textContent = el.classList.contains('open') ? '−' : '+';
}

render();
(async()=>{
  let changed=false;
  for(const key of Object.keys(PRODUCTS)){
    try{const saved=await spoolDBGet(`current-${key}`);if(saved){state.selections[key]=saved.selections||{};state.uploads[key]=saved.uploads||[];state.marks[key]=saved.marks||[];state.decorationReferences[key]=saved.decorationReferences||[];state.configReferences[key]=saved.configReferences||{fit:[],wash:[]};state.decorationReferenceNotes[key]=saved.decorationReferenceNotes||{};state.configReferenceNotes[key]=saved.configReferenceNotes||{fit:'',wash:''};state.packageReferences[key]=saved.packageReferences||{trim:{},branding:{}};state.packageReferenceNotes[key]=saved.packageReferenceNotes||{trim:{},branding:{}};state.fitSpecs[key]=saved.fitSpecs||{};state.referenceStudio[key]=saved.referenceStudio||state.referenceStudio[key];state.designFileNames[key]=saved.designName||null;state.designFileIds[key]=saved.designId||null;changed=true;}}catch(error){}
  }
  if(changed)render();
})();
</script>
